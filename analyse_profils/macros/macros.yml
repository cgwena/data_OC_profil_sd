version: 2

macros:
  - name: replace_comma
    description: >
      Cette macro remplace les virgules par des points dans une chaîne de caractères et convertit le résultat final 
      en format numérique (NUMBER). Très utile pour les données de l'Insee.
    arguments:
      - name: column_name
        type: string
        description: "Le nom de la colonne à nettoyer (attention, utilisez des guillemets simples en Jinja)."
  - name: remove_accents
    description: >
      Cette macro remplace les lettres accentuées par des lettres non accentuées.
    arguments:
      - name: column_name
        type: string
        description: "Le nom de la colonne à nettoyer (attention, utilisez des guillemets simples en Jinja)."